<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#5b21b6">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/icon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800&display=swap" rel="stylesheet">
  <title>Calendee</title>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-brand">
      <img src="/mascot.png" alt="Calendee" class="header-mascot">
      <h1>C<span class="accent">a</span>lend<span class="accent2">ee</span></h1>
    </div>
  </div>
  <div class="nav">
    <button class="nav-btn" id="prev"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button>
    <span class="month-title" id="monthTitle"></span>
    <button class="nav-btn" id="next"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 6 15 12 9 18"/></svg></button>
  </div>
  <div class="weekdays">
    <span class="weekday">Пн</span>
    <span class="weekday">Вт</span>
    <span class="weekday">Ср</span>
    <span class="weekday">Чт</span>
    <span class="weekday">Пт</span>
    <span class="weekday">Сб</span>
    <span class="weekday">Вс</span>
  </div>
  <div class="days" id="days"></div>
  <div class="stats" id="stats"></div>
  <div class="bottom-bar" id="bottomBar">
    <button class="today-btn" id="todayBtn">Сегодня</button>
  </div>
</div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
